    tags: [negation, boolean, commercial_auto]
    layers: [L2, L3, L4, L5]
    category: negation
    turns:
      - "Auto insurance for Pacific Coast Movers Inc, corporation, San Diego CA 92101. Contact Mia Torres 619-555-0328."
      - "2023 International MV607 VIN 3HAMMAAR3PL654321, hauling, San Diego CA 92101, 75 miles."
      - "It's not like we don't have telematics, we definitely do have them installed."
    expected:
