  - id: negation-question-format
    name: "Negation: Question Format Response No"
    tags: [negation, boolean, commercial_auto]
    layers: [L2, L3, L4, L5]
    category: negation
    turns:
      - "Need auto insurance for Quick Fix Plumbing LLC, Raleigh NC 27601. I'm Pete Morrison, 919-555-0672."
      - "2024 Chevy Silverado 2500 VIN 2GC4YREY3R1654321, service, Raleigh NC 27601, 35 miles."
