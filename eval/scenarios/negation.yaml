  - id: negation-combined
    name: "Negation: Multiple Negations in One Message"
    tags: [negation, boolean, commercial_auto]
    layers: [L2, L3, L4, L5]
    category: negation
    turns:
      - "Setting up commercial auto for Metro Cleaning Services LLC, LLC in Baltimore MD 21201. Contact Keisha Owens 410-555-0934."
      - "2023 Toyota Sienna VIN 5TDKRKEC1PS123456, commercial use, Baltimore MD 21201 radius 20 miles."
      - "No dash cams, no telematics, no hired autos, and no non-owned vehicles."
    expected:
      business.business_name: "Metro Cleaning Services LLC"
      auto_info.dash_cam: false
      auto_info.telematics: false
      auto_info.hired_auto: false
      auto_info.non_owned_auto: false
    absent: []
    expected_lobs: [commercial_auto]
    expected_forms: ["125", "127", "129", "137", "163"]

  - id: negation-then-correction
    name: "Negation Then Correction: Initially No Then Yes"
    tags: [negation, correction, boolean, commercial_auto]
    layers: [L2, L3, L4, L5]
    category: negation
    turns:
      - "Commercial auto for Iron Horse Transport LLC, Boise ID 83702. I'm Greg Lawson, 208-555-0741."
      - "2024 Kenworth T680 VIN 1XKYD49X4RJ789012, long haul, Boise ID 83702, 400 mile radius. We don't have dash cams."
      - "Actually wait, I was wrong. We do have dash cameras installed on all our trucks."
    expected:
      business.business_name: "Iron Horse Transport LLC"
      auto_info.dash_cam: true
      vehicles[0].year: "2024"
    absent:
      - auto_info.telematics
    expected_lobs: [commercial_auto]
    expected_forms: ["125", "127", "129", "137", "163"]

  - id: negation-double-negative
