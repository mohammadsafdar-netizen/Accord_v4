scenarios:
  - id: negation-no-dash-cam
    name: "Negation: No Dash Cam"
    tags: [negation, boolean, commercial_auto]
    layers: [L2, L3, L4, L5]
    category: negation
    turns:
      - "Need commercial auto for Apex Courier LLC in Miami FL 33130. I'm Daniel Cruz, 305-555-0214, daniel@apexcourier.com. EIN 65-4829137."
      - "2024 Ford Transit 150 VIN 1FTYE2CM4RKA56789 for delivery, garaged Miami FL 33130, 30 mile radius. No, we don't have dash cams."
    expected:
      business.business_name: "Apex Courier LLC"
      auto_info.dash_cam: false
      vehicles[0].year: "2024"
      vehicles[0].make: "Ford"
      vehicles[0].model: "Transit 150"
    absent:
      - auto_info.telematics
    expected_lobs: [commercial_auto]
    expected_forms: ["125", "127", "129", "137", "163"]

  - id: negation-no-telematics
