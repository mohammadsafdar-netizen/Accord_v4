scenarios:
  - id: correction-vehicle-year
    name: "Correction: Change Vehicle Year Mid-Conversation"
    tags: [correction, vehicle, commercial_auto]
    layers: [L2, L3, L4, L5]
    category: correction
    turns:
      - "Need commercial auto for Pioneer Pest Control LLC, Tucson AZ 85701. I'm Calvin Reed, 520-555-0483, calvin@pioneerpest.com. EIN 86-9134725. We have a 2022 Toyota Tacoma TRD VIN 3TMCZ5AN8NM345678 used for service, garaged Tucson AZ 85701, 40 mile radius."
      - "Sorry, I misspoke. The Tacoma is actually a 2023, not a 2022. Everything else is correct."
    expected:
      business.business_name: "Pioneer Pest Control LLC"
      business.contact_name: "Calvin Reed"
      vehicles[0].year: "2023"
      vehicles[0].make: "Toyota"
      vehicles[0].model: "Tacoma TRD"
      vehicles[0].vin: "3TMCZ5AN8NM345678"
      vehicles[0].garaging_address.city: "Tucson"
      vehicles[0].garaging_address.state: "AZ"
    absent:
      - loss_history
    expected_lobs: [commercial_auto]
    expected_forms: ["125", "127", "129", "137", "163"]

  - id: correction-ein
    name: "Correction: Change EIN / Tax ID"
    tags: [correction, business, commercial_auto]
    layers: [L2, L3, L4, L5]
    category: correction
    turns:
      - "Commercial auto for Lakeside Marine Services LLC in Traverse City MI 49684. Contact is Brenda Kowalski, 231-555-0619, brenda@lakesidemarine.com. Our EIN is 38-4521789."
      - "2024 Ford F-350 VIN 1FT8W3DT0RED45678 for service, garaged Traverse City MI 49684, 50 miles."
      - "Correction on the EIN: it should be 38-4527189, I transposed some digits. Sorry about that."
    expected:
      business.business_name: "Lakeside Marine Services LLC"
      business.tax_id: "38-4527189"
      business.contact_name: "Brenda Kowalski"
      vehicles[0].year: "2024"
      vehicles[0].make: "Ford"
      vehicles[0].model: "F-350"
    absent:
      - prior_insurance
    expected_lobs: [commercial_auto]
    expected_forms: ["125", "127", "129", "137", "163"]

