  - id: edge-extremely-long-message
    name: "Edge: Extremely Long Single Message"
    tags: [edge_case, long_input, commercial_auto]
    layers: [L2, L3, L4, L5]
    category: edge_cases
    turns:
      - "OK so let me tell you about our company and what we need. My company is called Continental Distributors Inc and we are a corporation headquartered at 8900 Distribution Way in Dayton Ohio 45402. We've been doing this for a really long time, about 25 years now, and we have grown quite a bit over the years. Currently we have about 60 employees working for us across our main facility and our satellite locations. My name is George Pappas and I'm the fleet manager here. You can reach me at 937-555-0814 or email me at gpappas@continentaldist.com. Our federal tax ID is 31-2948573 and our NAICS code is 424490. We also go by ContiDist which is our DBA. Our website is continentaldist.com. We need commercial auto insurance for our delivery fleet. We operate across Ohio Indiana Kentucky and West Virginia. Now for the vehicles, we have two main delivery trucks. The first one is a 2024 Freightliner M2 106 with VIN 1FVACXDT5RHKG1234, we use it for regional delivery runs, and it's garaged right here at our Dayton facility zip 45402, and the typical radius for that truck is about 200 miles. The second truck is a 2023 International CV515 with VIN 3HAMMAAM2PL567890, also used for delivery, same garage location, and it runs a similar 200 mile radius. Both of these trucks have dash cameras and GPS telematics installed. We do not use any hired autos and we do not have any non-owned auto exposure. For drivers we have George Pappas that's me, date of birth January 5 1972, Ohio CDL class A number PP2849317, and I've been driving for 30 years. Second driver is Rosa Martinez date of birth March 22 1985 Ohio CDL class B number RM4817293 with 16 years of experience. We want the policy to be effective November 1 2026. This would be a renewal for us, our current carrier is Travelers policy number TV-83924751 and it expires October 31 2026. For coverage we need 1 million combined single limit, comprehensive and collision each with a 2500 dollar deductible, and cargo coverage of 250 thousand. We had one claim back in 2023, it was a minor fender bender in a parking lot, cost about 4200 dollars in repairs, classified as a collision loss."
    expected:
      business.business_name: "Continental Distributors Inc"
      business.entity_type: "corporation"
      business.contact_name: "George Pappas"
      business.phone: "937-555-0814"
      business.email: "gpappas@continentaldist.com"
      business.mailing_address.line_one: "8900 Distribution Way"
      business.mailing_address.city: "Dayton"
      business.mailing_address.state: "OH"
      business.mailing_address.zip: "45402"
      business.tax_id: "31-2948573"
      business.dba: "ContiDist"
      business.website: "continentaldist.com"
      business.naics_code: "424490"
      business.years_in_business: "25"
      business.employee_count: "60"
