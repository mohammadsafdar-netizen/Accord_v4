      vehicles[1].make: "International"
      vehicles[1].model: "CV515"
      vehicles[1].vin: "3HAMMAAM2PL567890"
      vehicles[1].radius: "200"
      auto_info.dash_cam: true
      auto_info.telematics: true
      auto_info.hired_auto: false
      auto_info.non_owned_auto: false
      drivers[0].full_name: "George Pappas"
