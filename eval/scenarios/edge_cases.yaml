      - "Contact is Darlene Hopper, 816-555-0294, darlene@midwestfreight.com. EIN 44-8172935. 10 years, 20 employees."
      - "One truck, 2024 Peterbilt 579 VIN 1XPBD49X6RD123456, long haul, garaged in Kansas City MO 64105, 500 mile radius."
