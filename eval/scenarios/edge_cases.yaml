      business.mailing_address.city: "Kansas City"
      business.mailing_address.state: "MO"
      business.mailing_address.zip: "64105"
      vehicles[0].garaging_address.city: "Kansas City"
      vehicles[0].garaging_address.state: "MO"
      vehicles[0].garaging_address.zip: "64105"
