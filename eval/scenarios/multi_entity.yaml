    tags: [multi_entity, multi_lob, commercial_property, bop]
    layers: [L2, L3, L4, L5]
    category: multi_entity
    turns:
      - "I need commercial property insurance and a BOP for my retail store. Business name is Harbor View Gift Shop LLC, an LLC at 320 Waterfront Drive, Annapolis MD 21401."
      - "Contact is Lydia Marchetti, 410-555-0267, lydia@harborviewgifts.com. EIN 52-3847192. 6 years in business, 8 employees."
      - "The building is about 2,400 square feet, we lease it. Building value is $450,000 and our business personal property is worth about $175,000. We need $1M general liability included in the BOP."
      - "Effective date 05/01/2026. New policy. No prior commercial insurance, this is our first time getting proper coverage."
