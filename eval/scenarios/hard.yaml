scenarios:
  # --- HARD 1: Dense multi-entity dump in a single message ---
  - id: hard-bulk-fleet-dump
    name: "Dense Fleet Dump – 4 vehicles + 3 drivers in one message"
    tags: [commercial_auto, hard, bulk, multi_entity]
    layers: [L2, L3]
    category: hard
    turns:
      - "Cascade Hauling Inc, a Washington corporation. 7892 River Road, Tacoma WA 98402. Contact Denise Yamoto, denise@cascadehauling.com, (253) 555-6104. FEIN 91-4827361. Founded 2014, 22 employees, $9.4M revenue. Regional freight."
      - "Vehicles: 2023 Kenworth T680 VIN 1XKYDP9X4NJ487236 $148K, 2022 Peterbilt 579 VIN 1XPWD49X8MD692847 $136K, 2021 Freightliner Cascadia VIN 3AKJHHDR1LSKV2918 $119K, 2023 Utility 3000R trailer VIN 1UYVS2537NM483921 $34K. Drivers: James Okoro DOB 06/12/1976 WA D4827391 23 years, Linda Park DOB 09/28/1983 WA D5938274 15 years, Miguel Flores DOB 02/14/1979 OR D6749283 20 years. We operate WA OR ID, radius 450 miles, no hazmat."
      - "Prior carrier Old Republic, expired 04/30/2026, premium $47,200. Renewal effective 05/01/2026."
    expected:
      business.business_name: "Cascade Hauling Inc"
      business.entity_type: "corporation"
      business.contact_name: "Denise Yamoto"
      business.email: "denise@cascadehauling.com"
      business.phone: "(253) 555-6104"
      business.tax_id: "91-4827361"
      business.employee_count: "22"
      business.mailing_address.state: "WA"
      business.mailing_address.zip: "98402"
      vehicles[0].make: "Kenworth"
      vehicles[0].vin: "1XKYDP9X4NJ487236"
      vehicles[1].make: "Peterbilt"
      vehicles[2].make: "Freightliner"
      drivers[0].full_name: "James Okoro"
      drivers[0].dob: "06/12/1976"
      drivers[1].full_name: "Linda Park"
      drivers[2].full_name: "Miguel Flores"
      auto_info.vehicle_count: "4"
      auto_info.hazmat: "false"
      policy.status: "renewal"
      policy.effective_date: "05/01/2026"
    absent:
      - auto_info.hired_auto
    expected_lobs: [commercial_auto]

  # --- HARD 2: Correction storm — 3 corrections in 2 turns ---
  - id: hard-correction-storm
    name: "Correction Storm – Multiple mid-conversation corrections"
    tags: [commercial_auto, hard, correction]
    layers: [L2, L3]
    category: hard
    turns:
      - "Iron Peak Construction LLC, Denver CO 80216. Tom Reyes, tom@ironpeak.com, (303) 555-8821. EIN 84-2937461."
      - "Wait, actually the EIN is 84-2937462, I misread it. Also the email should be tom@ironpeakconstruction.com not tom@ironpeak.com."
      - "We have 18 employees, $6.2M revenue. Actually correction, it's 21 employees not 18."
      - "2022 Ford F-550 VIN 1FDUF5HT4NED12345 $68,000. I drive it for construction jobs, 80 mile radius. Colorado and Wyoming operations."
    expected:
      business.business_name: "Iron Peak Construction LLC"
      business.entity_type: "llc"
      business.tax_id: "84-2937462"
      business.email: "tom@ironpeakconstruction.com"
      business.employee_count: "21"
      business.mailing_address.state: "CO"
      vehicles[0].year: "2022"
      vehicles[0].make: "Ford"
      vehicles[0].vin: "1FDUF5HT4NED12345"
    expected_lobs: [commercial_auto]

  # --- HARD 3: Heavy negation — everything is "no" ---
  - id: hard-negation-heavy
    name: "Negation Heavy – No to everything optional"
    tags: [commercial_auto, hard, negation]
    layers: [L2, L3]
    category: hard
    turns:
      - "Quick Stop Courier LLC, Austin TX 78704. Maria Sanchez, maria@quickstopcourier.com, (512) 555-3319. FEIN 74-8293641."
      - "Local delivery only, 20 mile radius. No hazmat at all. No trailer interchange. No hired vehicles, no non-owned vehicles. No dash cameras. No telematics. No driver training program. No cargo insurance needed."
      - "One 2023 Ford Transit 250, VIN 1FTYE2CM3PKA45678. Worth $36,000."
      - "Just me driving. DOB 04/22/1988. TX license B8472916."
    expected:
      business.business_name: "Quick Stop Courier LLC"
      business.email: "maria@quickstopcourier.com"
      business.tax_id: "74-8293641"
      auto_info.hazmat: "false"
      auto_info.trailer_interchange: "false"
      auto_info.hired_auto: "false"
      auto_info.non_owned_auto: "false"
      auto_info.dash_cam: "false"
      auto_info.telematics: "false"
      auto_info.driver_training: "false"
      vehicles[0].vin: "1FTYE2CM3PKA45678"
      drivers[0].dob: "04/22/1988"
    absent:
      - auto_info.hazmat_commodity
    expected_lobs: [commercial_auto]

  # --- HARD 4: Hazmat carrier with complex cargo + loss history ---
  - id: hard-hazmat-loss-history
    name: "Hazmat + Loss History – Class 3 flammables with two prior claims"
    tags: [commercial_auto, hard, hazmat, loss_history]
    layers: [L2, L3]
    category: hard
    turns:
      - "Titan Chemical Transport Inc, Newark NJ 07114. Diana Kowalski, diana@titanchem.com, (201) 555-6739. FEIN 22-8473926. Corporation, founded 2012."
      - "We haul hazardous materials, specifically Class 3 flammable liquids. Interstate: NJ NY PA CT MA. Radius 400 miles. For hire carrier. 55 employees, $24M revenue."
      - "3 tanker trucks: 2023 Mack Anthem VIN 1M1AN4GY5PM012345 $185K, 2022 Mack Anthem VIN 1M1AN4GY5PM012346 $175K, 2021 Kenworth T880 VIN 1NKZL70X4MJ987654 $162K."
      - "Drivers: Peter Nowak DOB 01/05/1975 NJ N4729183 25 years CDL hazmat. James O'Brien DOB 09/18/1980 NJ N5847293 20 years."
      - "We had 2 claims: June 2023 minor collision $8,400 paid driver Nowak. February 2024 cargo damage from strap failure $21,500 paid no driver at fault."
      - "Prior carrier Zurich, expired 06/01/2026, premium $127,500. Renewal effective 06/01/2026."
    expected:
      business.business_name: "Titan Chemical Transport Inc"
      business.entity_type: "corporation"
      business.tax_id: "22-8473926"
      business.email: "diana@titanchem.com"
      business.employee_count: "55"
      auto_info.hazmat: "true"
      auto_info.for_hire: "true"
      auto_info.vehicle_count: "3"
      vehicles[0].make: "Mack"
      vehicles[0].vin: "1M1AN4GY5PM012345"
      vehicles[1].vin: "1M1AN4GY5PM012346"
      vehicles[2].make: "Kenworth"
      drivers[0].full_name: "Peter Nowak"
      drivers[1].full_name: "James O'Brien"
      policy.status: "renewal"
      policy.effective_date: "06/01/2026"
    expected_lobs: [commercial_auto]

  # --- HARD 5: Special characters in names + unusual entity type ---
