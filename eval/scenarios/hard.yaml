      - "Contact Sean O'Malley Jr., sean.omalley@johnsonomalley.com, (312) 555-4478. Our tax ID is 36-7294815."
      - "18 employees, $5.8M revenue. Regional trucking, IL IN WI. 300 mile radius. No hazmat."
      - "2 trucks: 2022 International LT VIN 3HSDJAPR5NN123456 $128K, 2023 Mack Anthem VIN 1M1AN4GY5PM654321 $155K."
    expected:
      business.business_name: "Johnson & O'Malley's Trucking Services"
      business.entity_type: "subchapter_s"
      business.contact_name: "Sean O'Malley"
      business.email: "sean.omalley@johnsonomalley.com"
      business.tax_id: "36-7294815"
      business.mailing_address.city: "Chicago"
      business.mailing_address.state: "IL"
      vehicles[0].make: "International"
      vehicles[1].make: "Mack"
      auto_info.hazmat: "false"
    expected_lobs: [commercial_auto]

